<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Login | Grand Horizon Hotel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- FIXED -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            background: var(--bg-main);
            background-image:
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 4.5rem 3rem 3.5rem;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.25rem;
        }

        .glass-input {
            padding-left: 55px !important;
            height: 55px;
        }
    </style>
</head>

<body>

    <div class="glass-card login-card text-center">
        <h2 class="fw-bold mb-3">Grand Horizon</h2>
        <p class="text-muted">Guest Login (Demo UI)</p>

        <!-- Static message instead of th:if -->
        <div class="alert alert-info">Demo Login Page (Backend not connected)</div>

        <!-- FIXED FORM -->
        <form action="#">
            <div class="mb-4 position-relative">
                <input type="text" class="glass-input form-control" placeholder="Email">
            </div>

            <div class="mb-4 position-relative">
                <input type="password" class="glass-input form-control" placeholder="Password">
            </div>

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <p class="mt-3 text-muted small">Static preview only</p>
    </div>

</body>

</html>
