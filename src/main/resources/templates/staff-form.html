<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Config | Grand Horizon Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-buildings-fill"></i>
            <span>Grand Horizon</span>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-fill"></i> Dashboard</a>
            <a class="nav-link" th:href="@{/guests}"><i class="bi bi-people-fill"></i> Guests</a>
            <a class="nav-link" th:href="@{/rooms}"><i class="bi bi-door-closed-fill"></i> Rooms</a>
            <a class="nav-link" th:href="@{/reservations}"><i class="bi bi-calendar-check-fill"></i> Reservations</a>
            <a class="nav-link" th:href="@{/reports}"><i class="bi bi-bar-chart-fill"></i> Reports</a>
            <a class="nav-link active" th:href="@{/staff}"><i class="bi bi-person-badge-fill"></i> Staff</a>
        </nav>
        <div style="position: absolute; bottom: 30px; width: calc(var(--sidebar-width) - 3rem);">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-link border-0 bg-transparent w-100 text-danger">
                    <i class="bi bi-box-arrow-right"></i> Sign Out
                </button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <div style="max-width: 800px; margin: 0 auto;" class="form-container">
            <header class="mb-5">
                <a th:href="@{/staff}"
                    class="btn btn-sm text-primary text-decoration-none p-0 mb-3 d-inline-flex align-items-center gap-2">
                    <i class="bi bi-arrow-left"></i> Back to Personnel Registry
                </a>
                <h1 class="h2 fw-bold mb-1"
                    th:text="${staff.staffId == null ? 'Hire Personnel Member' : 'Modify Employee Record'}"></h1>
                <p class="text-muted mb-0">Onboard and manage Grand Horizon's elite hospitality team.</p>
            </header>

            <div class="glass-card shadow-premium p-4 p-md-5">
                <form th:action="@{/staff/save}" th:object="${staff}" method="post">
                    <input type="hidden" th:field="*{staffId}">

                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label">Employee Professional Identity</label>
                            <div class="position-relative">
                                <i class="bi bi-person-badge position-absolute text-primary"
                                    style="left: 18px; top: 12px; font-size: 1.2rem;"></i>
                                <input type="text" th:field="*{name}" class="form-control ps-5 py-3"
                                    placeholder="Full legal name of employee" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Designated Portfolio (Role)</label>
                            <div class="position-relative">
                                <i class="bi bi-briefcase position-absolute text-primary"
                                    style="left: 18px; top: 12px; font-size: 1.2rem;"></i>
                                <input type="text" th:field="*{role}" class="form-control ps-5 py-3"
                                    placeholder="e.g. Executive Manager, Concierge" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Secure Connection (Phone)</label>
                            <div class="position-relative">
                                <i class="bi bi-telephone position-absolute text-primary"
                                    style="left: 18px; top: 12px; font-size: 1.2rem;"></i>
                                <input type="text" th:field="*{phone}" class="form-control ps-5 py-3"
                                    placeholder="10-digit mobile number" required maxlength="10" minlength="10"
                                    pattern="[0-9]{10}" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">Monthly Executive Remuneration (₹)</label>
                            <div class="position-relative">
                                <i class="bi bi-currency-rupee position-absolute text-primary"
                                    style="left: 18px; top: 12px; font-size: 1.2rem;"></i>
                                <input type="number" step="0.01" th:field="*{salary}" class="form-control ps-5 py-3"
                                    placeholder="Enter monthly stipend amount" required>
                            </div>
                        </div>

                        <div class="col-md-12 mt-5">
                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-premium px-5 py-3">
                                    <i class="bi bi-person-check me-2"></i> Confirm Record
                                </button>
                                <a th:href="@{/staff}" class="btn btn-light px-4 py-3 border-radius-12"
                                    style="border-radius: 12px; border: 1px solid #e2e8f0;">
                                    <i class="bi bi-x-circle me-2 text-muted"></i> Discard
                                </a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
