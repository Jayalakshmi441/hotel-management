<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Grand Horizon Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: var(--bg-main);
            /* Keeping the EXACT same background as Guest Login */
            background-image:
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            /* Changed from height to min-height */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            padding: 2rem 0;
            /* Add vertical padding for mobile */
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 4rem 3rem 3.5rem;
            /* Increased top padding */
            animation: fadeIn 0.8s ease-out;
            overflow: visible !important;
            /* Ensure no clipping */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* IMPORTANT FIX: Input Padding and Icon Alignment */
        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #dc2626;
            /* Administrative Red */
            font-size: 1.25rem;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-input {
            padding-left: 55px !important;
            /* Fix for overlapping icons - text starts AFTER icon */
            height: 55px;
            font-size: 1rem;
        }

        .admin-badge {
            background: #fee2e2;
            color: #dc2626;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            display: inline-block;
            border: 1px solid #fecaca;
            text-transform: uppercase;
        }

        .btn-admin {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.2);
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.4);
            color: white;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .smaller {
            font-size: 0.85rem;
        }

        .hover-red:hover {
            color: #dc2626 !important;
        }

        .logo-container {
            display: inline-block;
            margin: 0 auto 1.5rem;
            line-height: 1;
        }
    </style>
</head>

<body>
    <div class="glass-card login-card text-center">
        <div class="mb-5">
            <div class="display-4 text-danger mb-4 logo-container">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h2 class="fw-bold mb-2">Grand Horizon</h2>
            <div class="admin-badge mb-3">SYSTEM ADMINISTRATOR</div>
            <p class="text-muted small">High-Level Management Portal</p>
        </div>

        <!-- Thymeleaf Error Handling -->
        <div th:if="${param.error}"
            class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-20 text-danger small mb-4 text-start">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> Unauthorized Access or Invalid Credentials.
        </div>

        <form th:action="@{/admin/login}" method="post" class="text-start">
            <div class="mb-4">
                <label class="form-label small text-muted ms-1 fw-medium">Admin Username</label>
                <div class="position-relative">
                    <span class="input-icon">
                        <i class="bi bi-person-badge"></i>
                    </span>
                    <input type="text" id="username" name="username" class="glass-input form-control"
                        placeholder="Admin ID" required autofocus>
                </div>
            </div>

            <div class="mb-5">
                <label class="form-label small text-muted ms-1 fw-medium">Security Key</label>
                <div class="position-relative">
                    <span class="input-icon">
                        <i class="bi bi-key-fill"></i>
                    </span>
                    <input type="password" id="password" name="password" class="glass-input form-control"
                        placeholder="••••••••" maxlength="10" required>
                </div>
            </div>

            <button type="submit" class="btn btn-admin w-100 py-3 shadow-lg">
                Authenticate Admin Session
            </button>

            <div class="mt-4 text-center">
                <a th:href="@{/login}" class="text-muted smaller text-decoration-none hover-red transition-all">
                    <i class="bi bi-arrow-left me-1"></i> Back to Guest Login
                </a>
            </div>
        </form>

        <div class="mt-5 pt-3 border-top border-white border-opacity-10">
            <p class="text-muted smaller mb-0">© 2026 Grand Horizon Security Protocol</p>
        </div>
    </div>
</body>

</html>
