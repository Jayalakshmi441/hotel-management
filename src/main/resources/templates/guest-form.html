<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Configuration | Grand Horizon Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-control {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            border-radius: 12px;
            padding: 12px 16px 12px 48px;
            transition: var(--transition);
            font-size: 1rem;
        }

        .form-control:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            color: #1e293b;
            outline: none;
        }

        .form-label {
            font-weight: 600;
            color: #475569;
            margin-bottom: 10px;
            font-size: 0.95rem;
            display: block;
        }

        .input-icon-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 18px;
            color: var(--primary);
            font-size: 1.25rem;
            z-index: 5;
            pointer-events: none;
        }

        /* For textareas - icon at top */
        .icon-top i {
            top: 15px;
            transform: none;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-buildings-fill"></i>
            <span>Grand Horizon</span>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-fill"></i> Dashboard</a>
            <a class="nav-link active" th:href="@{/guests}"><i class="bi bi-people-fill"></i> Guests</a>
            <a class="nav-link" th:href="@{/rooms}"><i class="bi bi-door-closed-fill"></i> Rooms</a>
            <a class="nav-link" th:href="@{/reservations}"><i class="bi bi-calendar-check-fill"></i> Reservations</a>
            <a class="nav-link" th:href="@{/reports}"><i class="bi bi-bar-chart-fill"></i> Reports</a>
            <a class="nav-link" th:href="@{/staff}"><i class="bi bi-person-badge-fill"></i> Staff</a>
        </nav>
        <div style="position: absolute; bottom: 30px; width: calc(var(--sidebar-width) - 3rem);">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-link border-0 bg-transparent w-100 text-danger">
                    <i class="bi bi-box-arrow-right"></i> Sign Out
                </button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <div style="max-width: 800px; margin: 0 auto;" class="form-container">
            <header class="mb-5">
                <a th:href="@{/guests}"
                    class="btn btn-sm text-primary text-decoration-none p-0 mb-3 d-inline-flex align-items-center gap-2">
                    <i class="bi bi-arrow-left"></i> Back to Guest Registry
                </a>
                <h1 class="h2 fw-bold mb-1"
                    th:text="${guest.guestId == null ? 'Register New Guest' : 'Modify Guest Profile'}"></h1>
                <p class="text-muted mb-0">Establish a premium profile for our most distinguished visitors.</p>
            </header>

            <div th:if="${errorMessage}"
                class="alert alert-danger glass-card border-danger text-danger d-flex align-items-center gap-3 mb-4">
                <i class="bi bi-exclamation-triangle-fill fs-4"></i>
                <div th:text="${errorMessage}">Error Message</div>
            </div>

            <div class="glass-card shadow-premium p-4 p-md-5">
                <form th:action="@{/guests/save}" th:object="${guest}" method="post">
                    <input type="hidden" th:field="*{guestId}">

                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label">Full Legal Identity</label>
                            <div class="input-icon-wrapper">
                                <i class="bi bi-person-vcard"></i>
                                <input type="text" th:field="*{name}" class="form-control"
                                    placeholder="Enter guest's full name" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Primary Connection (Phone)</label>
                            <div class="input-icon-wrapper">
                                <i class="bi bi-telephone"></i>
                                <input type="text" th:field="*{phone}" class="form-control"
                                    placeholder="10-digit mobile number" required maxlength="10" minlength="10"
                                    pattern="[0-9]{10}" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Digital Correspondence (Email)</label>
                            <div class="input-icon-wrapper">
                                <i class="bi bi-envelope"></i>
                                <input type="email" th:field="*{email}" class="form-control"
                                    placeholder="guest@domain.com" required>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">Permanent Residency Address</label>
                            <div class="input-icon-wrapper icon-top">
                                <i class="bi bi-geo-alt"></i>
                                <textarea th:field="*{address}" class="form-control" rows="3"
                                    placeholder="Complete street address with city and ZIP code"></textarea>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">Verification Credential (ID Proof)</label>
                            <div class="input-icon-wrapper">
                                <i class="bi bi-card-checklist"></i>
                                <input type="text" th:field="*{idProof}" class="form-control"
                                    placeholder="e.g. Passport-XXXXXX, Aadhar-XXXX XXXX XXXX" required>
                            </div>
                        </div>

                        <div class="col-md-12 mt-5">
                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-premium px-5 py-3">
                                    <i class="bi bi-check2-circle me-2"></i> Confirm Profile
                                </button>
                                <a th:href="@{/guests}" class="btn btn-light px-4 py-3 border-radius-12"
                                    style="border-radius: 12px; border: 1px solid #e2e8f0;">
                                    <i class="bi bi-x-circle me-2 text-muted"></i> Discard
                                </a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div th:if="${param.success}"
                class="alert alert-success mt-4 glass-card border-success text-success d-flex align-items-center gap-3">
                <i class="bi bi-shield-check fs-4"></i>
                <div>
                    <strong>Verification Successful!</strong> Guest credentials have been securely stored in our
                    registry.
                </div>
            </div>
        </div>
    </div>
</body>

</html>
