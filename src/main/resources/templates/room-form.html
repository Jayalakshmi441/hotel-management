<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Config | Grand Horizon Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-control,
        .form-select {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            border-radius: 12px;
            padding: 12px 16px 12px 48px;
            transition: var(--transition);
            font-size: 1rem;
            height: 56px;
        }

        .form-control:focus,
        .form-select:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            color: #1e293b;
            outline: none;
        }

        .form-label {
            font-weight: 600;
            color: #475569;
            margin-bottom: 10px;
            font-size: 0.95rem;
            display: block;
        }

        .input-icon-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 18px;
            color: var(--primary);
            font-size: 1.25rem;
            z-index: 5;
            pointer-events: none;
        }

        .glass-card {
            border: 1px solid rgba(226, 232, 240, 0.8);
            background: #ffffff;
        }

        .form-container {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-buildings-fill"></i>
            <span>Grand Horizon</span>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-fill"></i> Dashboard</a>
            <a class="nav-link" th:href="@{/guests}"><i class="bi bi-people-fill"></i> Guests</a>
            <a class="nav-link active" th:href="@{/rooms}"><i class="bi bi-door-closed-fill"></i> Rooms</a>
            <a class="nav-link" th:href="@{/reservations}"><i class="bi bi-calendar-check-fill"></i> Reservations</a>
            <a class="nav-link" th:href="@{/reports}"><i class="bi bi-bar-chart-fill"></i> Reports</a>
            <a class="nav-link" th:href="@{/staff}"><i class="bi bi-person-badge-fill"></i> Staff</a>
        </nav>
        <div style="position: absolute; bottom: 30px; width: calc(var(--sidebar-width) - 3rem);">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-link border-0 bg-transparent w-100 text-danger">
                    <i class="bi bi-box-arrow-right"></i> Sign Out
                </button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <div style="max-width: 700px; margin: 0 auto;" class="form-container">
            <header class="mb-5">
                <a th:href="@{/rooms}"
                    class="btn btn-sm text-primary text-decoration-none p-0 mb-3 d-inline-flex align-items-center gap-2">
                    <i class="bi bi-arrow-left"></i> Back to Inventory
                </a>
                <h1 class="h2 fw-bold mb-1"
                    th:text="${room.roomId == null ? 'Register New Room' : 'Modify Room Units'}"></h1>
                <p class="text-muted mb-0">Configure premium room specifications and live pricing.</p>
            </header>

            <div th:if="${errorMessage}"
                class="alert alert-danger glass-card border-danger text-danger d-flex align-items-center gap-3 mb-4">
                <i class="bi bi-exclamation-triangle-fill fs-4"></i>
                <div th:text="${errorMessage}">Error Message</div>
            </div>

            <div th:if="${successMessage}"
                class="alert alert-success glass-card border-success text-success d-flex align-items-center gap-3 mb-4">
                <i class="bi bi-check-circle-fill fs-4"></i>
                <div th:text="${successMessage}">Success Message</div>
            </div>

            <div class="glass-card shadow-premium p-4 p-md-5">
                <form th:action="@{/rooms/save}" th:object="${room}" method="post">
                    <input type="hidden" th:field="*{roomId}">

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Unit Identifier</label>
                            <div class="input-icon-wrapper">
                                <i class="bi bi-hash"></i>
                                <input type="text" th:field="*{roomNumber}" class="form-control"
                                    placeholder="e.g. 101, B-202" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Accommodation Category</label>
                            <div class="input-icon-wrapper">
                                <i class="bi bi-tag"></i>
                                <select th:field="*{roomType}" class="form-select" required>
                                    <option value="" disabled selected>Select Category</option>
                                    <option th:each="type : ${types}" th:value="${type}" th:text="${type}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Base Rate per Night (₹)</label>
                            <div class="input-icon-wrapper">
                                <i class="bi bi-currency-rupee"></i>
                                <input type="number" step="0.01" th:field="*{pricePerNight}" class="form-control"
                                    placeholder="e.g. 4500.00" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Operational Status</label>
                            <div class="input-icon-wrapper">
                                <i class="bi bi-info-circle"></i>
                                <select th:field="*{status}" class="form-select" required>
                                    <option value="" disabled selected>Select Status</option>
                                    <option th:each="st : ${statuses}" th:value="${st}"
                                        th:text="${#strings.replace(st, '_', ' ')}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="col-md-12 mt-5">
                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-premium px-5 py-3">
                                    <i class="bi bi-check2-circle me-2"></i> Publish Room
                                </button>
                                <a th:href="@{/rooms}" class="btn btn-light px-4 py-3"
                                    style="border-radius: 12px; border: 1px solid #e2e8f0;">
                                    <i class="bi bi-x-circle me-2 text-muted"></i> Discard
                                </a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div th:if="${param.success}"
                class="alert alert-success mt-4 glass-card border-success text-success d-flex align-items-center gap-3">
                <i class="bi bi-check-circle-fill fs-4"></i>
                <div>
                    <strong>Success!</strong> Room has been successfully registered.
                </div>
            </div>
        </div>
    </div>
</body>

</html>
