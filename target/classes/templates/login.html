<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Grand Horizon Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: var(--bg-main);
            background-image:
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 4.5rem 3rem 3.5rem;
            /* Increased top padding */
            animation: fadeIn 0.8s ease-out;
            overflow: visible !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-control {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 12px;
            padding: 12px 16px 12px 55px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
            color: white;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.2rem;
        }

        .logo-container {
            display: inline-block;
            margin: 0 auto 1.5rem;
            line-height: 1;
        }
    </style>
</head>

<body>
    <div class="glass-card login-card text-center">
        <div class="mb-5">
            <div class="display-4 text-primary mb-4 logo-container">
                <i class="bi bi-buildings-fill"></i>
            </div>
            <h2 class="fw-bold mb-1">Grand Horizon</h2>
            <p class="text-muted">Luxury Management Portal</p>
        </div>

        <div th:if="${param.error}"
            class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-20 text-danger small mb-4">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid credentials.
        </div>

        <div th:if="${param.logout}"
            class="alert alert-success bg-success bg-opacity-10 border-success border-opacity-20 text-success small mb-4">
            <i class="bi bi-check-circle-fill me-2"></i> Logged out successfully.
        </div>

        <form th:action="@{/login}" method="post" class="text-start">
            <div class="mb-4 position-relative">
                <label class="form-label small text-muted ms-1">Username</label>
                <div class="position-relative">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" id="username" name="username" class="form-control"
                        placeholder="Enter admin username" required>
                </div>
            </div>

            <div class="mb-5 position-relative">
                <label class="form-label small text-muted ms-1">Password</label>
                <div class="position-relative">
                    <i class="bi bi-shield-lock input-icon"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                        maxlength="10" required>
                </div>
            </div>

            <button type="submit" class="btn btn-premium w-100 py-3 shadow-lg">
                Sign In to Dashboard
            </button>
        </form>

        <div class="mt-5 pt-3 border-top border-white border-opacity-10">
            <p class="text-muted smaller mb-0">© 2026 Grand Horizon Hotel Group</p>
        </div>
    </div>
</body>

</html>
