<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Book a Room | Grand Horizon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-main">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="glass-card p-5 shadow-premium">
                    <header class="mb-5 d-flex justify-content-between align-items-center">
                        <div>
                            <h2 class="fw-bold text-dark mb-2">Book Your Next Stay</h2>
                            <p class="text-muted mb-0">Experience luxury at its finest.</p>
                        </div>
                        <a th:href="@{/user/dashboard}" class="btn btn-outline-secondary btn-sm px-3">
                            <i class="bi bi-x-lg"></i> Cancel
                        </a>
                    </header>

                    <form th:action="@{/user/book}" th:object="${reservation}" method="post">
                        <!-- Hidden Guest ID - Security: Overridden in Controller -->
                        <input type="hidden" th:field="*{guest.guestId}">

                        <div class="row g-4">
                            <!-- Select Room -->
                            <div class="col-12">
                                <label class="form-label small text-muted text-uppercase fw-bold">Select Available
                                    Room</label>
                                <select th:field="*{room.roomId}" class="glass-input form-select" required>
                                    <option value="" disabled selected>— Choose from our premium inventory —</option>
                                    <option th:each="rm : ${rooms}" th:value="${rm.roomId}"
                                        th:text="${rm.roomNumber + ' - ' + rm.roomType + ' (₹' + rm.pricePerNight + '/night)'}">
                                    </option>
                                </select>
                            </div>

                            <!-- Dates -->
                            <div class="col-md-6">
                                <label class="form-label small text-muted text-uppercase fw-bold">Check-in Date</label>
                                <input type="date" th:field="*{checkInDate}" class="glass-input form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small text-muted text-uppercase fw-bold">Check-out Date</label>
                                <input type="date" th:field="*{checkOutDate}" class="glass-input form-control" required>
                            </div>

                            <div class="col-12 mt-5">
                                <button type="submit" class="btn btn-premium w-100 py-3 shadow-lg">
                                    <i class="bi bi-check-circle-fill me-2"></i> Confirm My Reservation
                                </button>
                                <p class="text-center text-muted small mt-3">
                                    <i class="bi bi-shield-lock-fill"></i> Payment collected at check-in.
                                </p>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
